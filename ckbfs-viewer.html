  <style>
    :root {
      --bg:#0a0c0f; --surface:#111318; --surface2:#181c23; --border:#1e2430;
      --accent:#00c8ff; --accent2:#7b5cfa; --green:#00e5a0; --orange:#ff8c42;
      --text:#e2e8f0; --muted:#64748b;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.6;}
    a{color:var(--accent);text-decoration:none;}a:hover{text-decoration:underline;}

    header{border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;background:rgba(10,12,15,.95);backdrop-filter:blur(12px);z-index:100;}
    .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;}
    .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;color:var(--text);text-decoration:none;}
    .logo img{width:28px;height:28px;}
    nav{display:flex;gap:1.5rem;}
    nav a{color:var(--muted);font-size:.9rem;transition:color .2s;}
    nav a:hover,nav a.active{color:var(--text);text-decoration:none;}
    .nav-join{background:var(--accent);color:#000!important;padding:.3rem .9rem;border-radius:99px;font-size:.82rem!important;font-weight:600;}
    .nav-toggle{display:none;background:none;border:none;color:var(--text);font-size:1.4rem;cursor:pointer;}
    @media(max-width:768px){

      nav#mainNav{display:none;flex-direction:column;gap:0;position:absolute;top:60px;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);z-index:99;padding:.5rem 0;}
      nav#mainNav.open{display:flex;}
      nav#mainNav a{padding:.6rem 2rem;}
      .member-only{display:none;}
    }

    main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;}
    .page-header{margin-bottom:1.5rem;}
    .page-header h1{font-size:1.6rem;font-weight:700;}
    .page-header p{color:var(--muted);font-size:.9rem;margin-top:.3rem;}

    .toolbar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;}
    .net-pill{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:99px;overflow:hidden;}
    .net-pill button{background:none;border:none;color:var(--muted);font-size:.82rem;padding:.35rem .9rem;cursor:pointer;transition:all .15s;}

<script type="module">
import { parseIdentifier, resolveCKBFS, formatSize } from './src/ckbfs-resolver.js?v=7';

const RPC_URL = { mainnet: 'https://mainnet.ckbapp.dev', testnet: 'https://testnet.ckbapp.dev' };
const EXPLORER = { mainnet: 'https://explorer.nervos.org', testnet: 'https://pudge.explorer.nervos.org' };

let currentNetwork = 'mainnet';
let currentAddress  = null;
let dobCells        = [];

// ── Init ──────────────────────────────────────────────────────────────────────
const storedAddr = localStorage.getItem('wyltek_address');
if (storedAddr) {
  currentAddress = storedAddr;
  document.getElementById('walletBadge').style.display = 'flex';
  document.getElementById('walletShort').textContent = storedAddr.slice(0, 10) + '…' + storedAddr.slice(-6);
}

document.getElementById('identifier').addEventListener('keydown', e => { if (e.key === 'Enter') loadManual(); });
document.getElementById('navToggle')?.addEventListener('click', () => {
  document.getElementById('mainNav').classList.toggle('open');
});

setNetwork('mainnet');

// ── Network ───────────────────────────────────────────────────────────────────
window.switchNetwork = setNetwork;
function setNetwork(net) {
  currentNetwork = net;
  document.getElementById('btnMainnet').classList.toggle('active', net === 'mainnet');
  document.getElementById('btnTestnet').classList.toggle('active', net === 'testnet');
  loadInventory();
}

// ── Load inventory ────────────────────────────────────────────────────────────
window.loadInventory = loadInventory;
async function loadInventory() {
  const grid  = document.getElementById('inventoryGrid');
  const state = document.getElementById('inventoryState');
  grid.innerHTML = '';
  closeDetail();

  if (!currentAddress) {
    state.innerHTML = `<div class="state-msg">
      <div class="icon">🔗</div>
      <h3>Connect your wallet</h3>
      <p>Sign in on the <a href="/members.html">members page</a> to view your DOBs.</p>
    </div>`;
    return;
  }

  state.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><span>Scanning for DOBs on ${currentNetwork}…</span></div>`;

  try {
    const cells = await fetchSporeCells(currentAddress, currentNetwork);
    dobCells = cells;
    state.innerHTML = '';

    if (!cells.length) {
      state.innerHTML = `<div class="state-msg">
        <div class="icon">📭</div>
        <h3>No DOBs found</h3>
        <p>No Spore DOBs on ${currentNetwork} for this address.<br>
        <a href="/mint/" target="_blank">Mint one →</a></p>
      </div>`;
      return;
    }

    renderGrid(cells);
  } catch (e) {
    console.error('[inventory] load failed:', e);
    state.innerHTML = `<div class="state-msg">
      <div class="icon">⚠️</div>
      <h3>Failed to load</h3>
      <p>${e.message}</p>
    </div>`;
  }
}

// ── Fetch Spore cells via indexer ─────────────────────────────────────────────
async function fetchSporeCells(address, network) {
  const rpc = RPC_URL[network];

  // Spore type script code hashes
  const SPORE_HASHES = [
    '0x4a4dce1df3dffff7f8b2cd7dff7303df3b6150c9788cb75dcf6747247132b9f5', // mainnet v1
    '0x5e063b4c0e7abeaa6a428df3b693521a1a22d24e6b', // mainnet v2 (approx)
    '0x685a60219309029d01182c8d57c12166e6d39ea4e18a5b0a4b7e4c42fde851cb', // testnet
  ];

  // Use indexer get_cells with lock script filter + has type script
  const resp = await fetch(rpc, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      jsonrpc: '2.0', id: 1,
      method: 'get_cells',
      params: [{
        script: addressToLock(address, network),
        script_type: 'lock',
        with_data: true,
        filter: { output_data_len_range: ['0x0', '0xffffff'] },
      }, 'asc', '0x64'],
    }),
  });

  const json = await resp.json();
  if (json.error) throw new Error(`RPC error: ${json.error.message}`);
  const objects = json.result?.objects || [];

  // Keep only cells that have a type script (DOBs / Spore / CKBFS)
  return objects
    .filter(c => c.output?.type)
    .map(c => ({
      outPoint:   c.out_point,
      typeScript: c.output.type,
      capacity:   c.output.capacity,
      data:       c.output_data || '0x',
    }));
}

function addressToLock(address, network) {
  // JoyID lock (used by Phill + Wyltek members)
  // code_hash: 0xd00c84f0ec8fd441c38bc3f87a371f547190f2fcff88e642bc5bf54b9e318323
  // For secp256k1: 0x9bd7e06f3ecf4be0f2fcd2188b23f1b9fcc88e5d4b65a8637b17723bbda3cce8
  // Extract args by decoding the bech32m address
  try {
    const args = decodeAddressArgs(address);
    // Try JoyID lock first (22-byte args = JoyID)
    const codeHash = args.length === 44 // 22 bytes hex = 44 chars
      ? '0xd00c84f0ec8fd441c38bc3f87a371f547190f2fcff88e642bc5bf54b9e318323'
      : '0x9bd7e06f3ecf4be0f2fcd2188b23f1b9fcc88e5d4b65a8637b17723bbda3cce8';
    return { code_hash: codeHash, hash_type: 'type', args: '0x' + args };
  } catch {
    // Fallback: use secp256k1 with empty args (will return nothing but won't crash)
    return { code_hash: '0x9bd7e06f3ecf4be0f2fcd2188b23f1b9fcc88e5d4b65a8637b17723bbda3cce8', hash_type: 'type', args: '0x' };
  }
}

function decodeAddressArgs(address) {
  // CKB full address (bech32m): payload = type(1) + code_hash(32) + hash_type(1) + args
  // Short address: prefix(1) + args(20)
  // We decode bech32m and skip header bytes to get args
  const words = bech32mDecode(address);
  if (!words) throw new Error('Cannot decode address');
  // Skip: format_type(1) + code_hash(32) + hash_type(1) = 34 bytes
  const argsBytes = words.slice(34);
  return argsBytes.map(b => b.toString(16).padStart(2, '0')).join('');
}

function bech32mDecode(addr) {
  // Minimal bech32m decode — convert address to payload bytes
  const CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
  const sep = addr.lastIndexOf('1');
  if (sep < 1) return null;
  const data = addr.slice(sep + 1).toLowerCase();
  const values = [];
  for (const c of data) {
    const v = CHARSET.indexOf(c);
    if (v < 0) return null;
    values.push(v);
  }
  // Convert 5-bit groups to 8-bit bytes (skip last 6 checksum chars)
  const payload = values.slice(0, -6);
  const bytes = [];
  let acc = 0, bits = 0;
  for (const v of payload) {
    acc = (acc << 5) | v;
    bits += 5;
    if (bits >= 8) { bits -= 8; bytes.push((acc >> bits) & 0xff); }
  }
  return bytes;
}

// ── Render grid ───────────────────────────────────────────────────────────────
function renderGrid(cells) {
  const grid = document.getElementById('inventoryGrid');
  grid.innerHTML = '';
  cells.forEach((cell, idx) => {
    const typeId  = cell.typeScript?.args || cell.outPoint?.tx_hash || '?';
    const shortId = typeId.length > 16 ? typeId.slice(0, 10) + '…' + typeId.slice(-6) : typeId;

    const card = document.createElement('div');
    card.className = 'dob-card';
    card.dataset.idx = idx;
    card.innerHTML = `
      <div class="dob-thumb"><div class="thumb-spin"><div class="spinner"></div></div></div>
      <div class="dob-info">
        <div class="dob-name">DOB #${idx + 1}</div>
        <div class="dob-id" title="${typeId}">${shortId}</div>
        <span class="dob-badge">Spore</span>
      </div>`;
    card.addEventListener('click', () => openDetail(cell, idx));
    grid.appendChild(card);
    loadThumb(card, cell, idx);
  });
}

async function loadThumb(card, cell, idx) {
  const thumbEl = card.querySelector('.dob-thumb');
  const badgeEl = card.querySelector('.dob-badge');
  const nameEl  = card.querySelector('.dob-name');

  const setThumb = (src, label) => {
    thumbEl.innerHTML = `<img src="${src}" alt="DOB ${idx}" loading="lazy" />`;
    if (label) badgeEl.textContent = label;
  };
  const setPlaceholder = () => { thumbEl.innerHTML = '<span class="thumb-ph">📄</span>'; };

  try {
    // 1. Try inline image in cell data
    const data = cell.data;
    if (data && data.length > 4) {
      const bytes = hexToBytes(data);
      const mime  = sniffMime(bytes);
      if (mime?.startsWith('image/')) {
        const url = URL.createObjectURL(new Blob([bytes], { type: mime }));
        setThumb(url, 'Inline');
        nameEl.textContent = `DOB #${idx + 1}`;
        return;
      }
    }

    // 2. Try CKBFS resolve using type args as TypeID
    const typeId = cell.typeScript?.args;
    if (typeId && typeId.length === 66) {
      try {
        const result = await resolveCKBFS(typeId, currentNetwork, () => {});
        if (result?.fileBytes && result.contentType?.startsWith('image/')) {
          let bin = '';
          for (let i = 0; i < result.fileBytes.length; i++) bin += String.fromCharCode(result.fileBytes[i]);
          setThumb(`data:${result.contentType};base64,${btoa(bin)}`, 'CKBFS');
          if (result.filename) nameEl.textContent = result.filename;
          return;
        }
      } catch { /* not CKBFS */ }
    }

    setPlaceholder();
  } catch { setPlaceholder(); }
}

// ── Detail panel ──────────────────────────────────────────────────────────────
window.closeDetail = closeDetail;
function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  document.querySelectorAll('.dob-card').forEach(c => c.classList.remove('selected'));
}

async function openDetail(cell, idx) {
  document.querySelectorAll('.dob-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.dob-card[data-idx="${idx}"]`)?.classList.add('selected');

  const panel = document.getElementById('detailPanel');
  const body  = document.getElementById('detailBody');
  document.getElementById('detailTitle').textContent = `DOB #${idx + 1}`;

  body.innerHTML = `<div class="detail-preview"><div class="prev-spin"><div class="spinner"></div><span>Loading…</span></div></div>`;
  panel.classList.add('open');
  document.getElementById('overlay').classList.add('visible');

  const typeId      = cell.typeScript?.args || '';
  const txHash      = cell.outPoint?.tx_hash || '';
  const explorerBase = EXPLORER[currentNetwork];
  const shortTx     = txHash ? txHash.slice(0, 10) + '…' + txHash.slice(-6) : '–';
  const shortType   = typeId ? typeId.slice(0, 10) + '…' + typeId.slice(-6) : '–';
  const capacityCKB = cell.capacity ? (parseInt(cell.capacity, 16) / 1e8).toFixed(2) + ' CKB' : '–';

  let previewHtml = '<div class="detail-preview"><span class="prev-ph">📄</span></div>';
  let storageMode = 'Unknown';
  let filename    = '';
  let fileSize    = '';

  try {
    // Try inline
    const data = cell.data;
    if (data && data.length > 4) {
      const bytes = hexToBytes(data);
      const mime  = sniffMime(bytes);
      if (mime?.startsWith('image/')) {
        const url = URL.createObjectURL(new Blob([bytes], { type: mime }));
        previewHtml = `<div class="detail-preview"><img src="${url}" alt="DOB" /></div>`;
        storageMode = 'Inline';
        fileSize    = formatSize(bytes.length);
      }
    }

    // Try CKBFS
    if (storageMode === 'Unknown' && typeId && typeId.length === 66) {
      try {
        const result = await resolveCKBFS(typeId, currentNetwork, () => {});
        if (result?.fileBytes) {
          storageMode = 'CKBFS';
          filename    = result.filename || '';
          fileSize    = formatSize(result.fileBytes.length);
          if (result.contentType?.startsWith('image/')) {
            let bin = '';
            for (let i = 0; i < result.fileBytes.length; i++) bin += String.fromCharCode(result.fileBytes[i]);
            previewHtml = `<div class="detail-preview"><img src="data:${result.contentType};base64,${btoa(bin)}" alt="${filename}" /></div>`;
          }
        }
      } catch { /* not CKBFS */ }
    }
  } catch(e) { console.error('[detail]', e); }

  body.innerHTML = `
    ${previewHtml}
    <table class="meta-table">
      <tr><td>Storage</td><td>${storageMode}</td></tr>
      ${filename ? `<tr><td>File</td><td>${filename}</td></tr>` : ''}
      ${fileSize  ? `<tr><td>Size</td><td>${fileSize}</td></tr>` : ''}
      <tr><td>Capacity</td><td>${capacityCKB}</td></tr>
      <tr><td>Type args</td><td title="${typeId}">${shortType}</td></tr>
      <tr><td>TX</td><td><a href="${explorerBase}/transaction/${txHash}" target="_blank" title="${txHash}">${shortTx} ↗</a></td></tr>
      <tr><td>Network</td><td>${currentNetwork}</td></tr>
    </table>
    <div class="detail-actions">
      <a href="${explorerBase}/transaction/${txHash}" target="_blank" class="btn-action">🔍 Explorer</a>
      ${typeId.length === 66 ? `<button class="btn-action" onclick="viewInMinter('${typeId}')">👁 View in Minter</button>` : ''}
      <button class="btn-action" onclick="copyText('${typeId || txHash}')">📋 Copy ID</button>
    </div>
  `;
}

window.viewInMinter = (typeId) => {
  window.open(`/mint/?view=${typeId}&net=${currentNetwork}`, '_blank');
};

window.copyText = (text) => {
  try { navigator.clipboard.writeText(text); } catch {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
};

// ── Manual lookup ─────────────────────────────────────────────────────────────
window.loadManual = async () => {
  const raw = document.getElementById('identifier').value.trim();
  if (!raw) return;
  let typeId;
  try { typeId = parseIdentifier(raw); } catch(e) { alert(e.message); return; }
  const fakeCell = {
    outPoint: { tx_hash: typeId },
    typeScript: { args: typeId, code_hash: '0x', hash_type: 'type' },
    capacity: '0x0',
    data: '0x',
  };
  await openDetail(fakeCell, -1);
  document.getElementById('detailTitle').textContent = 'Manual Lookup';
};

// ── Utils ─────────────────────────────────────────────────────────────────────
function hexToBytes(hex) {
  const h = hex.startsWith('0x') ? hex.slice(2) : hex;
  const arr = new Uint8Array(h.length / 2);
  for (let i = 0; i < arr.length; i++) arr[i] = parseInt(h.slice(i*2, i*2+2), 16);
  return arr;
}

function sniffMime(bytes) {
  if (bytes[0]===0xFF && bytes[1]===0xD8) return 'image/jpeg';
  if (bytes[0]===0x89 && bytes[1]===0x50) return 'image/png';
  if (bytes[0]===0x47 && bytes[1]===0x49) return 'image/gif';
  if (bytes[0]===0x52 && bytes[1]===0x49) return 'image/webp';
  return null;
}
