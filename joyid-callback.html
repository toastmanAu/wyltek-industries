<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Connecting JoyID…</title>
  <style>
    body { background:#0a0c0f; color:#64748b; font-family:system-ui;
           display:flex; align-items:center; justify-content:center;
           height:100vh; margin:0; font-size:.9rem; flex-direction:column; gap:12px; }
    .spinner { width:28px; height:28px; border:3px solid #1e293b;
               border-top-color:#00c8ff; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:#94a3b8; margin:0; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p id="msg">Completing sign in…</p>
  <script type="module">
    import { isJoyIDCallback, joyidHandleCallback, getJoyIDPending, clearJoyIDPending }
      from '/js/joyid-connector-ios-fix.js';

    const msg = document.getElementById('msg');

    if (isJoyIDCallback()) {
      // Redirect flow — JoyID returned here with ?_data_=...
      try {
        const result = await joyidHandleCallback();
        const pending = getJoyIDPending();
        clearJoyIDPending();
        // Store result in localStorage (works in iOS standalone mode)
        localStorage.setItem('joyid_result', JSON.stringify(result));
        msg.textContent = '✓ Signed in — returning…';
        const returnTo = pending?.returnTo || '/members.html';
        setTimeout(() => location.replace(returnTo), 300);
      } catch(e) {
        msg.textContent = '⚠ ' + (e.message || 'Authentication failed');
        setTimeout(() => location.replace('/members.html'), 2000);
      }
    } else if (window.opener) {
      // Popup flow — SDK handles result via postMessage; just close
      msg.textContent = '✓ Signed — closing…';
      setTimeout(() => window.close(), 500);
    } else {
      // No data, no opener — go home
      location.replace('/members.html');
    }
  </script>
</body>
</html>
