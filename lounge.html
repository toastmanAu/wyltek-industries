<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Wyltek Industries" />
  <meta property="og:title" content="Members Lounge — Wyltek Industries" />
  <meta property="og:description" content="Wyltek Industries members lounge — real-time chat for founding members." />
  <meta property="og:url" content="https://wyltekindustries.com/lounge.html" />
  <meta property="og:image" content="https://wyltekindustries.com/wyltek-logo.png" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:site" content="@wyltek1" />
  <meta name="twitter:title" content="Members Lounge — Wyltek Industries" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg:#0a0c0f; --surface:#111318; --surface2:#181c23; --border:#1e2430;
      --accent:#00c8ff; --accent2:#7b5cfa; --green:#00e5a0; --orange:#ff8c42;
      --red:#ff4560; --text:#e2e8f0; --muted:#64748b; --tag-bg:#1a2035;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; font-size:15px; line-height:1.6; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
    a { color:var(--accent); text-decoration:none; }

    /* Header */
    header { border-bottom:1px solid var(--border); padding:0 2rem; background:rgba(10,12,15,.95); backdrop-filter:blur(12px); z-index:100; flex-shrink:0; }
    .header-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:60px; }
    .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:1.1rem; color:var(--text); text-decoration:none; }
    nav { display:flex; gap:1.5rem; }
    nav a { color:var(--muted); font-size:.9rem; transition:color .2s; }
    nav a:hover, nav a.active { color:var(--text); text-decoration:none; }
    .member-only { display:none !important; }
    #mainNav.member-nav .member-only { display:inline-flex !important; }
    .nav-join{color:var(--accent,#00c8ff)!important;font-weight:600;border:1px solid rgba(0,200,255,.3);border-radius:99px;padding:.15rem .65rem;transition:background .2s,border-color .2s!important;}
    .nav-join:hover{background:rgba(0,200,255,.1);border-color:var(--accent,#00c8ff);text-decoration:none!important;}
    .nav-toggle { display:none; background:none; border:none; color:var(--text); font-size:1.4rem; cursor:pointer; }
    @media(max-width:768px){
      .nav-toggle{display:block;}
      nav#mainNav{display:none;flex-direction:column;gap:0;position:absolute;top:60px;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);z-index:99;}
      nav#mainNav.open{display:flex; max-height: 80vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      nav#mainNav a{padding:.7rem 1.5rem;font-size:1rem;border-bottom:1px solid var(--border);}
    }

    /* Lounge layout */
    .lounge-wrap { flex:1; display:flex; flex-direction:column; max-width:820px; width:100%; margin:0 auto; padding:0 1rem; overflow:hidden; }
    .lounge-header { padding:1.25rem 0 .75rem; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
    .lounge-title { font-size:1.25rem; font-weight:700; display:flex; align-items:center; gap:.5rem; }
    .lounge-title span { color:var(--green); }
    .conn-badge { font-size:.8rem; color:var(--muted); background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:.2rem .7rem; display:flex; align-items:center; gap:.4rem; }
    .conn-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background .3s; }
    .conn-dot.live { background:var(--green); }
    .conn-dot.offline { background:var(--red); }

    /* Tabs */
    .channels { display:flex; gap:.35rem; border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto; }
    .ch-tab { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); cursor:pointer; padding:.55rem .9rem; font-size:.88rem; font-family:inherit; transition:color .15s, border-color .15s; white-space:nowrap; margin-bottom:-1px; }
    .ch-tab:hover { color:var(--text); }
    .ch-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .ch-count { background:var(--tag-bg); color:var(--muted); border-radius:10px; padding:.05rem .4rem; font-size:.75rem; margin-left:.3rem; }

    /* Feed */
    .feed { flex:1; overflow-y:auto; padding:.75rem 0; display:flex; flex-direction:column; gap:.25rem; }
    .feed::-webkit-scrollbar { width:4px; }
    .feed::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    .msg-card { display:flex; gap:.75rem; padding:.65rem .75rem; border-radius:10px; transition:background .12s; }
    .msg-card:hover { background:var(--surface); }
    .msg-card.is-new { animation:fadeUp .22s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }

    .msg-avatar { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; color:#fff; overflow:hidden; }
    .msg-avatar img { width:100%; height:100%; object-fit:cover; }

    .msg-body { flex:1; min-width:0; }
    .msg-meta { display:flex; align-items:baseline; gap:.5rem; margin-bottom:.1rem; flex-wrap:wrap; }
    .msg-name { font-weight:600; font-size:.9rem; }
    .msg-addr { font-family:monospace; font-size:.74rem; color:var(--muted); }
    .msg-time { font-size:.74rem; color:var(--muted); }
    .msg-text { font-size:.92rem; word-break:break-word; white-space:pre-wrap; }

    .msg-actions { display:flex; align-items:center; gap:.35rem; margin-top:.4rem; flex-wrap:wrap; }
    .react-btn { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:.18rem .5rem; font-size:.8rem; cursor:pointer; color:var(--muted); display:flex; align-items:center; gap:.22rem; transition:background .12s, border-color .12s; }
    .react-btn:hover, .react-btn.on { background:var(--tag-bg); border-color:var(--accent2); color:var(--text); }
    .react-btn .rc { color:var(--muted); font-size:.76rem; min-width:8px; }
    .del-btn { background:none; border:none; cursor:pointer; color:var(--muted); font-size:.85rem; padding:.18rem .35rem; border-radius:4px; transition:color .12s; margin-left:auto; }
    .del-btn:hover { color:var(--red); }

    /* States */
    .state-center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); gap:.5rem; text-align:center; padding:2rem; }
    .state-center .icon { font-size:2.5rem; }
    .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Composer */
    .composer { border-top:1px solid var(--border); padding:.85rem 0 .9rem; flex-shrink:0; }
    .composer-row { display:flex; gap:.6rem; align-items:flex-end; }
    .msg-ta { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:inherit; font-size:.92rem; padding:.6rem .85rem; resize:none; min-height:42px; max-height:120px; line-height:1.5; transition:border-color .2s; }
    .msg-ta:focus { outline:none; border-color:var(--accent2); }
    .msg-ta::placeholder { color:var(--muted); }
    .send-btn { background:var(--accent2); color:#fff; border:none; border-radius:8px; padding:.52rem 1.15rem; font-size:.9rem; font-weight:600; cursor:pointer; font-family:inherit; transition:opacity .15s; flex-shrink:0; height:42px; }
    .send-btn:hover { opacity:.85; }
    .send-btn:disabled { opacity:.4; cursor:not-allowed; }
    .composer-foot { display:flex; justify-content:space-between; align-items:center; margin-top:.35rem; min-height:1.3em; }
    .compose-err { font-size:.8rem; color:var(--red); }
    .char-ct { font-size:.78rem; color:var(--muted); }
    .char-ct.warn { color:var(--orange); }
    .char-ct.over { color:var(--red); }

    /* Toast */
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.7rem 1.1rem; font-size:.87rem; z-index:999; animation:fadeUp .2s ease; }
    .toast.ok  { border-color:var(--green); }
    .toast.err { border-color:var(--red); }
  </style>

<div class="lounge-wrap">

      <span class="conn-dot" id="connDot"></span>

<script src="js/nav-toggle.js"></script>
<script src="js/wyltek-auth.js"></script>
<script>
(function () {
  'use strict';

  // ── Config ────────────────────────────────────────────────────────────────
  const SB_URL     = 'https://yhntwgjzrzyhyxpiqcts.supabase.co';
  const SB_ANON    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlobnR3Z2p6cnp5aHl4cGlxY3RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mjc2ODMsImV4cCI6MjA4ODEwMzY4M30.HhTEKmSQs-qaOhoQr4cJxRfTfpWEjGqB3TwQnRWCm4Y';
  const WORKER_URL = 'https://wyltek-lounge.toastman-one.workers.dev'; // update after deploy
  const EMOJIS     = ['👍', '🔥', '🧠', '⚡'];
  const PAGE_SIZE  = 60;

  // ── Check ?admin=TOKEN in URL ─────────────────────────────────────────────
  const urlParams = new URLSearchParams(location.search);
  const adminParam = urlParams.get('admin');
  if (adminParam) {
    localStorage.setItem('wyltek_admin', adminParam);
    urlParams.delete('admin');
    history.replaceState({}, '', location.pathname + (urlParams.toString() ? '?' + urlParams : ''));
    location.reload();
    return;
  }

  // ── State ─────────────────────────────────────────────────────────────────
  const sb        = supabase.createClient(SB_URL, SB_ANON);
  const MY_ADDR   = localStorage.getItem('wyltek_address') || '';
  const ADMIN_TOK = localStorage.getItem('wyltek_admin') || '';
  const IS_ADMIN  = ADMIN_TOK.length > 0;

  let currentCh   = 'general';
  let messages    = [];
  let profiles    = {};      // addr → { display_name, avatar_url }
  let rCounts     = {};      // msgId → { emoji → count }
  let myReacts    = {};      // msgId → Set<emoji>
  let realtimeSub = null;

  // ── DOM ───────────────────────────────────────────────────────────────────
  const feed       = document.getElementById('feed');
  const msgInput   = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');
  const charCt     = document.getElementById('charCt');
  const composeErr = document.getElementById('composeErr');
  const connDot    = document.getElementById('connDot');
  const connLabel  = document.getElementById('connLabel');

  // ── Utils ─────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function shortAddr(a) {
    return a ? a.slice(0, 8) + '…' + a.slice(-4) : '???';
  }
  function avatarBg(a) {
    const h = (a || '').split('').reduce((n, c) => n + c.charCodeAt(0), 0) % 360;
    return `hsl(${h},50%,42%)`;
  }
  function relTime(ts) {
    const s = Math.floor((Date.now() - new Date(ts)) / 1000);
    if (s < 60)    return 'just now';
    if (s < 3600)  return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
  }
  function toast(msg, type = 'ok') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2800);
  }
  function setConn(state) {
    connDot.className = 'conn-dot ' + state;
    connLabel.textContent = state === 'live' ? 'Live' : state === 'offline' ? 'Offline' : 'Connecting…';
  }

  // ── Profiles ──────────────────────────────────────────────────────────────
  async function ensureProfiles(addrs) {
    const missing = [...new Set(addrs)].filter(a => a && !profiles[a]);
    if (!missing.length) return;
    const { data } = await sb.from('profiles').select('ckb_address,display_name,avatar_url').in('ckb_address', missing);
    (data || []).forEach(p => { profiles[p.ckb_address] = p; });
  }

  // ── Reactions ─────────────────────────────────────────────────────────────
  async function loadReactions(ids) {
    if (!ids.length) return;
    const { data } = await sb.from('lounge_reactions')
      .select('message_id,address,emoji')
      .in('message_id', ids);
    (data || []).forEach(r => {
      if (!rCounts[r.message_id]) rCounts[r.message_id] = {};
      rCounts[r.message_id][r.emoji] = (rCounts[r.message_id][r.emoji] || 0) + 1;
      if (r.address === MY_ADDR) {
        if (!myReacts[r.message_id]) myReacts[r.message_id] = new Set();
        myReacts[r.message_id].add(r.emoji);
      }
    });
  }

  async function toggleReact(msgId, emoji, btn) {
    const mine = myReacts[msgId] || new Set();
    const already = mine.has(emoji);
    if (!rCounts[msgId]) rCounts[msgId] = {};

    // Optimistic
    if (already) {
      rCounts[msgId][emoji] = Math.max(0, (rCounts[msgId][emoji] || 1) - 1);
      mine.delete(emoji);
      btn.classList.remove('on');
    } else {
      rCounts[msgId][emoji] = (rCounts[msgId][emoji] || 0) + 1;
      mine.add(emoji);
      btn.classList.add('on');
    }
    myReacts[msgId] = mine;
    const countEl = btn.querySelector('.rc');
    const c = rCounts[msgId][emoji] || 0;
    if (countEl) countEl.textContent = c > 0 ? c : '';

    if (already) {
      await sb.from('lounge_reactions').delete()
        .eq('message_id', msgId).eq('address', MY_ADDR).eq('emoji', emoji);
    } else {
      await sb.from('lounge_reactions').insert({ message_id: msgId, address: MY_ADDR, emoji });
    }
  }

  // ── Render message card ───────────────────────────────────────────────────
  function makeCard(msg, isNew) {
    const p = profiles[msg.address] || {};
    const name = p.display_name || shortAddr(msg.address);
    const card = document.createElement('div');
    card.className = 'msg-card' + (isNew ? ' is-new' : '');
    card.dataset.id = msg.id;

    // Avatar
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    if (p.avatar_url) {
      const img = document.createElement('img');
      img.src = p.avatar_url;
      img.alt = name;
      img.onerror = () => { av.style.background = avatarBg(msg.address); av.textContent = name.slice(0,2).toUpperCase(); };
      av.appendChild(img);
    } else {
      av.style.background = avatarBg(msg.address);
      av.textContent = name.slice(0,2).toUpperCase();
    }

    // Body
    const body = document.createElement('div');
    body.className = 'msg-body';

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.innerHTML =
      `<span class="msg-name">${esc(name)}</span>` +
      `<span class="msg-addr" title="${esc(msg.address)}">${p.display_name ? esc(shortAddr(msg.address)) : ''}</span>` +
      `<span class="msg-time" title="${esc(new Date(msg.created_at).toLocaleString())}">${relTime(msg.created_at)}</span>`;

    const txt = document.createElement('div');
    txt.className = 'msg-text';
    txt.textContent = msg.message;

    // Actions
    const acts = document.createElement('div');
    acts.className = 'msg-actions';

    const mc = rCounts[msg.id] || {};
    const mine = myReacts[msg.id] || new Set();

    EMOJIS.forEach(emoji => {
      const count = mc[emoji] || 0;
      const btn = document.createElement('button');
      btn.className = 'react-btn' + (mine.has(emoji) ? ' on' : '');
      btn.innerHTML = `${emoji} <span class="rc">${count > 0 ? count : ''}</span>`;
      btn.title = emoji;
      btn.addEventListener('click', () => toggleReact(msg.id, emoji, btn));
      acts.appendChild(btn);
    });

    if (IS_ADMIN) {
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '🗑️';
      del.title = 'Delete (admin)';
      del.addEventListener('click', () => adminDelete(msg.id, card));
      acts.appendChild(del);
    }

    body.appendChild(meta);
    body.appendChild(txt);
    body.appendChild(acts);
    card.appendChild(av);
    card.appendChild(body);
    return card;
  }

  function renderFeed() {
    const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80;
    feed.innerHTML = '';
    if (!messages.length) {
      feed.innerHTML = `<div class="state-center"><div class="icon">💬</div><div>No messages in #${currentCh} yet</div><div style="font-size:.83rem">Be the first to say something!</div></div>`;
      return;
    }
    messages.forEach(m => feed.appendChild(makeCard(m, false)));
    if (atBottom) feed.scrollTop = feed.scrollHeight;
  }

  function updateCount(ch, n) {
    const el = document.getElementById('cnt-' + ch);
    if (el) el.textContent = n || '';
  }

  // ── Load channel ──────────────────────────────────────────────────────────
  async function loadChannel(ch) {
    feed.innerHTML = '<div class="state-center"><div class="spinner"></div></div>';
    messages = [];

    const { data, error } = await sb.from('lounge_messages')
      .select('*')
      .eq('channel', ch)
      .eq('deleted', false)
      .order('created_at', { ascending: true })
      .limit(PAGE_SIZE);

    if (error) {
      feed.innerHTML = '<div class="state-center"><div class="icon">⚠️</div><div>Failed to load messages</div></div>';
      return;
    }

    messages = data || [];
    await Promise.all([
      ensureProfiles(messages.map(m => m.address)),
      loadReactions(messages.map(m => m.id)),
    ]);

    renderFeed();
    feed.scrollTop = feed.scrollHeight;
    updateCount(ch, messages.length);
  }

  // ── Realtime ──────────────────────────────────────────────────────────────
  function subscribeRealtime() {
    if (realtimeSub) { try { realtimeSub.unsubscribe(); } catch(e){} realtimeSub = null; }
    try {
      realtimeSub = sb.channel('lounge-rt-' + currentCh)
        .on('postgres_changes', {
          event: '*', schema: 'public', table: 'lounge_messages',
          filter: 'channel=eq.' + currentCh,
        }, async (payload) => {
          if (payload.eventType === 'INSERT') {
            const msg = payload.new;
            if (msg.deleted) return;
            await ensureProfiles([msg.address]);
            await loadReactions([msg.id]);
            messages.push(msg);
            const card = makeCard(msg, true);
            const empty = feed.querySelector('.state-center');
            if (empty) feed.innerHTML = '';
            feed.appendChild(card);
            updateCount(currentCh, messages.length);
            if (feed.scrollHeight - feed.scrollTop - feed.clientHeight < 120) {
              feed.scrollTop = feed.scrollHeight;
            }
          }
          if (payload.eventType === 'UPDATE' && payload.new.deleted) {
            messages = messages.filter(m => m.id !== payload.new.id);
            const card = feed.querySelector(`[data-id="${payload.new.id}"]`);
            if (card) card.remove();
            updateCount(currentCh, messages.length);
          }
        })
        .subscribe(status => {
          if (status === 'SUBSCRIBED') setConn('live');
          else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
            setConn('offline');
            setTimeout(subscribeRealtime, 4000);
          }
        });
    } catch (e) {
      console.error('[Lounge] Realtime error:', e);
      setConn('offline');
      setTimeout(subscribeRealtime, 5000);
    }
  }

  // ── Admin delete ──────────────────────────────────────────────────────────
  async function adminDelete(id, cardEl) {
    if (!confirm('Delete this message?')) return;
    try {
      const res = await fetch(`${WORKER_URL}/message/${id}`, {
        method: 'DELETE',
        headers: { 'X-Admin-Token': ADMIN_TOK },
      });
      if (res.ok) {
        cardEl.style.opacity = '0.3';
        setTimeout(() => cardEl.remove(), 300);
        messages = messages.filter(m => m.id !== id);
        updateCount(currentCh, messages.length);
        toast('Message deleted');
      } else {
        toast('Delete failed', 'err');
      }
    } catch (e) {
      toast('Delete failed', 'err');
    }
  }

  // ── Channel tabs ──────────────────────────────────────────────────────────
  document.querySelectorAll('.ch-tab').forEach(tab => {
    tab.addEventListener('click', async () => {
      document.querySelectorAll('.ch-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentCh = tab.dataset.ch;
      await loadChannel(currentCh);
      subscribeRealtime();
    });
  });

  // ── Composer ──────────────────────────────────────────────────────────────
  msgInput.addEventListener('input', () => {
    const len = msgInput.value.length;
    charCt.textContent = len + ' / 500';
    charCt.className = 'char-ct' + (len > 450 ? (len >= 500 ? ' over' : ' warn') : '');
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
    composeErr.textContent = '';
  });

  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
  });

  sendBtn.addEventListener('click', async () => {
    const msg = msgInput.value.trim();
    if (!msg) return;
    if (!MY_ADDR) { composeErr.textContent = 'Not logged in — reload'; return; }
    if (msg.length > 500) { composeErr.textContent = 'Too long'; return; }

    sendBtn.disabled = true;
    composeErr.textContent = '';

    try {
      const res = await fetch(WORKER_URL + '/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address: MY_ADDR, channel: currentCh, message: msg }),
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok) {
        composeErr.textContent = json.error || 'Failed to send';
      } else {
        msgInput.value = '';
        msgInput.style.height = 'auto';
        charCt.textContent = '0 / 500';
      }
    } catch (e) {
      // Offline? Queue for later
      if (!navigator.onLine) {
        try {
          const { outbox } = await import('/js/offline-outbox.js');
          await outbox.add({
            type: 'lounge_message',
            label: 'Lounge message in #' + currentCh,
            data: { address: MY_ADDR, channel: currentCh, message: msg }
          });
          msgInput.value = '';
          msgInput.style.height = 'auto';
          charCt.textContent = '0 / 500';
          composeErr.style.color = '#f59e0b';
          composeErr.textContent = '📤 Saved offline — will upload when you reconnect';
          setTimeout(() => { composeErr.textContent = ''; composeErr.style.color = ''; }, 4000);
        } catch {
          composeErr.textContent = 'Offline — message not saved';
        }
      } else {
        composeErr.textContent = 'Network error — try again';
      }
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  setConn('connecting');
  // Pre-load current user's own profile so their avatar shows immediately
  if (MY_ADDR) ensureProfiles([MY_ADDR]);

  loadChannel(currentCh).then(() => subscribeRealtime());

})();
</script>
  <script src="/js/pwa.js" defer></script>
</body>
</html>
